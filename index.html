<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 01 - Focus Tasks</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

    <header>
        <h1>Task 01 - Focus Tasks</h1>
        <p>Week 09 — DOM Manipulation & Events</p>
    </header>

    <main class="app">
        <section class="todo-box">
            <h2>My Focus List</h2>
            <p class="subtitle">Plan your day and finish your tasks step by step</p>

            <div class="input-area">
                <input type="text" id="taskInput" placeholder="Write a new task...">
                <button id="addBtn">Add</button>
            </div>

            <div class="filters">
                <button class="filter active" data-filter="all">All</button>
                <button class="filter" data-filter="active">Active</button>
                <button class="filter" data-filter="completed">Completed</button>
                <button id="clearCompleted">Clear Done</button>
            </div>

            <ul id="taskList"></ul>

            <div class="summary">
                <span id="remainingCount">0</span> tasks remaining
            </div>
        </section>
    </main>

    <footer>
        Al-Aqsa University — Web Development 1
    </footer>

</body>
</html>
